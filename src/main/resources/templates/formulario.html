<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Formulario')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>

<main class="conteudo estreito">
    <h1>Cadastro de carro</h1>

    <form th:action="@{/salvar}" th:object="${carroForm}" method="post" class="formulario">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label>Nome</label>
        <input th:field="*{nome}">
        <small th:errors="*{nome}"></small>

        <label>Codigo</label>
        <input th:field="*{codigo}" placeholder="BYD-SEAL">
        <small th:errors="*{codigo}"></small>

        <label>Preco</label>
        <input th:field="*{preco}" type="number" step="0.01">
        <small th:errors="*{preco}"></small>

        <label>Autonomia</label>
        <input th:field="*{autonomia}">
        <small th:errors="*{autonomia}"></small>

        <label>Potencia</label>
        <input th:field="*{potencia}">
        <small th:errors="*{potencia}"></small>

        <label>Descricao</label>
        <textarea th:field="*{descricao}" rows="4"></textarea>
        <small th:errors="*{descricao}"></small>

        <button type="submit">Salvar</button>
    </form>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
